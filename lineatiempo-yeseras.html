<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Línea Temporal Vectorial - Cronología Arqueológica</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8f4ed, #fff);
            color: #2d2d2d;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            color: #2c5530;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .svg-container {
            max-width: 1400px;
            margin: 0 auto;
            overflow-x: auto;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        svg {
            background: white;
            display: block;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            color: #666;
            font-size: 0.9rem;
        }

        /* Estilos específicos para etiquetas SVG */
        .bar-label-range {
            font-size: 14px;
            fill: #c94c4c;
            font-weight: bold;
            font-family: 'Segoe UI', sans-serif;
            text-anchor: middle;
        }

        .bar-label-event-lower {
            font-size: 12px;
            fill: #8b5a2b;
            font-weight: bold;
            font-family: 'Segoe UI', sans-serif;
            text-anchor: middle;
        }

        .point-label {
            font-size: 12px;
            fill: #2c5530;
            font-weight: bold;
            font-family: 'Segoe UI', sans-serif;
            text-anchor: middle;
            /* Ligero offset para no tocar la barra si está muy cerca */
            dy="-5"; 
        }

        .point-date {
            font-size: 10px;
            fill: #666;
            font-family: 'Segoe UI', sans-serif;
            text-anchor: middle;
        }

        .year-label {
            font-size: 11px;
            fill: #555;
            font-family: 'Segoe UI', sans-serif;
            text-anchor: middle;
        }
    </style>
</head>
<body>
    <header>
        <h1>Línea Temporal Vectorial</h1>
        <p>Camino de las Yeseras & Soto-Henares | 3000–1100 a.n.e.</p>
    </header>

    <div class="svg-container">
        <svg viewBox="0 0 1400 400" preserveAspectRatio="xMidYMid meet">
            <!-- Fondo -->
            <rect x="0" y="0" width="1400" height="400" fill="#ffffff"/>
            
            <!-- Eje temporal principal -->
            <line x1="80" y1="330" x2="1320" y2="330" stroke="#2c5530" stroke-width="4" stroke-linecap="round"/>
            <polygon points="1320,330 1300,325 1300,335" fill="#2c5530"/>
            
            <!-- ============================================
                 MARCAS DE AÑO (cada 100 años)
                 ============================================ -->
            <g class="year-marks">
                <line x1="80" y1="320" x2="80" y2="340" stroke="#666" stroke-width="3"/>
                <text x="80" y="365" class="year-label" font-weight="bold">3000</text>
                
                <line x1="145" y1="320" x2="145" y2="340" stroke="#666" stroke-width="2"/>
                <text x="145" y="365" class="year-label">2900</text>
                
                <line x1="210" y1="320" x2="210" y2="340" stroke="#666" stroke-width="2"/>
                <text x="210" y="365" class="year-label">2800</text>
                
                <line x1="276" y1="320" x2="276" y2="340" stroke="#666" stroke-width="2"/>
                <text x="276" y="365" class="year-label">2700</text>
                
                <line x1="341" y1="320" x2="341" y2="340" stroke="#666" stroke-width="2"/>
                <text x="341" y="365" class="year-label">2600</text>
                
                <line x1="406" y1="320" x2="406" y2="340" stroke="#666" stroke-width="2"/>
                <text x="406" y="365" class="year-label">2500</text>
                
                <line x1="472" y1="320" x2="472" y2="340" stroke="#666" stroke-width="2"/>
                <text x="472" y="365" class="year-label">2400</text>
                
                <line x1="537" y1="320" x2="537" y2="340" stroke="#666" stroke-width="2"/>
                <text x="537" y="365" class="year-label">2300</text>
                
                <line x1="603" y1="320" x2="603" y2="340" stroke="#666" stroke-width="2"/>
                <text x="603" y="365" class="year-label">2200</text>
                
                <line x1="668" y1="320" x2="668" y2="340" stroke="#666" stroke-width="2"/>
                <text x="668" y="365" class="year-label">2100</text>
                
                <line x1="733" y1="320" x2="733" y2="340" stroke="#666" stroke-width="2"/>
                <text x="733" y="365" class="year-label">2000</text>
                
                <line x1="799" y1="320" x2="799" y2="340" stroke="#666" stroke-width="2"/>
                <text x="799" y="365" class="year-label">1900</text>
                
                <line x1="864" y1="320" x2="864" y2="340" stroke="#666" stroke-width="2"/>
                <text x="864" y="365" class="year-label">1800</text>
                
                <line x1="930" y1="320" x2="930" y2="340" stroke="#666" stroke-width="2"/>
                <text x="930" y="365" class="year-label">1700</text>
                
                <line x1="995" y1="320" x2="995" y2="340" stroke="#666" stroke-width="2"/>
                <text x="995" y="365" class="year-label">1600</text>
                
                <line x1="1060" y1="320" x2="1060" y2="340" stroke="#666" stroke-width="2"/>
                <text x="1060" y="365" class="year-label">1500</text>
                
                <line x1="1126" y1="320" x2="1126" y2="340" stroke="#666" stroke-width="2"/>
                <text x="1126" y="365" class="year-label">1400</text>
                
                <line x1="1191" y1="320" x2="1191" y2="340" stroke="#666" stroke-width="2"/>
                <text x="1191" y="365" class="year-label">1300</text>
                
                <line x1="1256" y1="320" x2="1256" y2="340" stroke="#666" stroke-width="2"/>
                <text x="1256" y="365" class="year-label">1200</text>
                
                <line x1="1320" y1="320" x2="1320" y2="340" stroke="#666" stroke-width="3"/>
                <text x="1320" y="365" class="year-label" font-weight="bold">1100</text>
            </g>
            
            <!-- ============================================
                 BARRAS TEMPORALES
                 ============================================ -->
            
            <!-- RANGO CAMINO YESERAS (2700-1365 cal aC) -->
            <!-- Franja Roja -->
            <rect x="276" y="220" width="870" height="45" fill="#c94c4c" opacity="0.25" rx="6"/>
            
            <!-- ETIQUETA ENCIMA de la franja -->
            <text x="711" y="205" class="bar-label-range">Rango C14 Camino de las Yeseras (2700–1365 cal aC)</text>
            
            <!-- EVENTO ARIDEZ 4,0 ka BP (2450-1950 cal aC) -->
            <!-- Superpuesto sobre LA LÍNEA PRINCIPAL (y=320) -->
            <rect x="438" y="320" width="326" height="20" fill="#8b5a2b" opacity="0.4" rx="3"/>
            
            <!-- ETIQUETA DEL EVENTO ARIDEZ DEBAJO de la barra -->
            <text x="601" y="355" class="bar-label-event-lower">Evento Aridez 4,0 ka BP (2450–1950)</text>
            
            <!-- Líneas guías verticales del evento de aridez -->
            <line x1="438" y1="280" x2="438" y2="320" stroke="#8b5a2b" stroke-width="1.5" stroke-dasharray="3,3"/>
            <line x1="764" y1="280" x2="764" y2="320" stroke="#8b5a2b" stroke-width="1.5" stroke-dasharray="3,3"/>
            
            <!-- ============================================
                 EVENTOS PUNTUALES (sobre la franja roja)
                 ============================================ -->
            
            <!-- Enterramiento 6 mujeres jóvenes (2350-2190, medio ~2270) -->
            <!-- X = 556 (igual que antes) -->
            <!-- Y = 245 (dentro de la franja roja que va de 220 a 265 aprox) -->
            <circle cx="556" cy="245" r="10" fill="#2c5530" stroke="#fff" stroke-width="2"/>
            <text x="556" y="230" class="point-label">Enterramiento 6 mujeres jóvenes</text>
            <text x="556" y="265" class="point-date" fill="#fff" font-weight="bold">2350–2190</text>
            
            <!-- Soto-Henares (2125) -->
            <!-- X = 651 -->
            <!-- Y = 245 (mismo nivel que el anterior, sobre la franja) -->
            <circle cx="651" cy="245" r="10" fill="#2c5530" stroke="#fff" stroke-width="2"/>
            <text x="651" y="230" class="point-label">Soto-Henares</text>
            <text x="651" y="265" class="point-date" fill="#fff" font-weight="bold">2125</text>
            
            <!-- Título general -->
            <text x="700" y="50" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c5530">Escala Cronológica: 3000 – 1100 a.n.e.</text>
        </svg>
    </div>

    <!-- LEYENDA ELIMINADA -->

    <footer>
        <p>Datos arqueológicos — Camino de las Yeseras (Madrid) & Soto-Henares</p>
        <p>Escala: 3000 a.n.e. a 1100 a.n.e. (1900 años totales)</p>
    </footer>
</body>
</html>
